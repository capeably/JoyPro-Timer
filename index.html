<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JoyPro Timer</title>
<link rel="icon" type="image/png" href="joypro-logo-dark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@600&family=DM+Mono:wght@400;500&family=Rethink+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/timer.css">
<link rel="stylesheet" href="css/modals.css">
<link rel="stylesheet" href="css/utilities.css">
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-title"><img src="joypro-logo-dark.png" alt="JoyPro" class="header-logo">JoyPro Timer</div>
    <div class="header-actions">
      <button class="header-btn" id="themeToggle" title="Toggle theme">&#9789;</button>
      <button class="header-btn" id="muteToggle" title="Toggle sound (M)">&#128276;</button>
      <button class="header-btn" id="popoutBtn" title="Open popout window">&#10064;</button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">
    <!-- Timer Area -->
    <div class="timer-area" id="timerArea">
        <div class="current-segment-title" id="currentTitle">Focus Block 1</div>
        <div class="timer-digits" id="timerDigits">25:00</div>
        <div class="timer-progress-bar">
          <div class="timer-progress-fill" id="progressFill" style="width: 100%"></div>
        </div>

      <div class="timer-controls">
        <button class="ctrl-btn" id="resetBtn" title="Reset session (R)">&#8634;</button>
        <button class="ctrl-btn primary" id="playBtn" title="Play/Pause (Space)">&#9654;</button>
        <button class="ctrl-btn" id="skipBtn" title="Next segment (N)">&#9197;</button>
      </div>

      <!-- Transition overlay -->
      <div class="transition-overlay" id="transitionOverlay">
        <div class="transition-label">Next up</div>
        <div class="transition-title" id="transitionTitle"></div>
        <div class="transition-countdown" id="transitionCountdown">Starting in 3...</div>
        <div class="transition-actions">
          <button class="transition-btn start" id="transitionStart">Start Now</button>
          <button class="transition-btn skip" id="transitionSkipBtn">Skip</button>
        </div>
      </div>

      <!-- Complete overlay -->
      <div class="complete-overlay" id="completeOverlay">
        <div class="complete-icon">&#10003;</div>
        <div class="complete-title">Session Complete!</div>
        <div class="complete-sub">Great session. Take a moment to breathe.</div>
        <button class="modal-btn primary" id="restartBtn" style="margin-top:12px">Start Over</button>
      </div>
    </div><!-- /.timer-area -->

    <!-- Expand tab (visible when panel collapsed) -->
    <button class="panel-tab-btn sidebar-expand-btn" id="sidebarExpandBtn" title="Show segments">
      <div class="tab-arrow up"></div>
    </button>

    <!-- Bottom Panel (Segments/Session) -->
    <aside class="sidebar-panel" id="sidebarPanel">
      <!-- Collapse tab sits on top of panel -->
      <button class="panel-tab-btn panel-collapse-tab" id="panelCollapseBtn" title="Hide segments">
        <div class="tab-arrow down"></div>
      </button>
      <div class="sidebar-panel-inner">
        <div class="panel-resize-handle" id="panelResizeHandle"></div>
        <div class="sidebar-header">
          <div class="sidebar-name-row">
            <div class="sidebar-session-name" id="sidebarSessionName"></div>
          </div>
          <div class="sidebar-toolbar">
            <button class="sidebar-btn" id="panelEditBtn" title="Edit session (E)">&#9998;</button>
            <button class="sidebar-btn" id="panelSaveBtn" title="Save session">&#128190;</button>
            <button class="sidebar-btn" id="panelSaveAsBtn" title="Save as new session">&#128203;</button>
            <button class="sidebar-btn" id="panelNewBtn" title="New session">&#43;</button>
            <button class="sidebar-btn" id="panelMenuBtn" title="Load saved session">&#9776;</button>
          </div>
        </div>
        <div class="sidebar-segments" id="sidebarSegments"></div>
      </div>
    </aside>
  </div><!-- /.main -->
</div><!-- /.app -->

<!-- EDITOR MODAL -->
<div class="modal-overlay" id="editorModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editorModalTitle">Edit Session</div>
      <button class="modal-close" id="editorClose">&times;</button>
    </div>
    <div class="modal-body" id="editorBody">
      <input type="text" class="editor-session-name" id="editorSessionName" placeholder="Session name" spellcheck="false">
      <div id="editorSegments"></div>
      <button class="editor-add-btn" id="editorAdd">+ Add Segment</button>
    </div>
    <div class="modal-footer">
      <button class="modal-btn secondary" id="editorCancel">Cancel</button>
      <button class="modal-btn primary" id="editorSave">Save</button>
    </div>
  </div>
</div>

<!-- SAVED SESSIONS MODAL -->
<div class="modal-overlay" id="savedModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Saved Sessions</div>
      <button class="modal-close" id="savedClose">&times;</button>
    </div>
    <div class="modal-body" id="savedBody"></div>
    <div class="modal-footer">
      <button class="modal-btn secondary" id="savedImportBtn">Import</button>
      <button class="modal-btn secondary" id="savedExportBtn">Export</button>
      <span style="flex:1"></span>
      <button class="modal-btn secondary" id="savedCloseBtn">Close</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="modal-btn secondary" id="confirmNo">Cancel</button>
      <button class="modal-btn primary" id="confirmYes">Confirm</button>
    </div>
  </div>
</div>

<!-- SAVE PROMPT DIALOG (unsaved changes) -->
<div class="save-prompt-overlay" id="savePromptOverlay">
  <div class="save-prompt-box">
    <div class="save-prompt-msg" id="savePromptMsg">Save changes to this session?</div>
    <div class="save-prompt-actions">
      <button class="modal-btn secondary" id="savePromptCancel">Cancel</button>
      <button class="modal-btn secondary" id="savePromptDiscard">Don't Save</button>
      <button class="modal-btn secondary" id="savePromptSaveAs">Save As</button>
      <button class="modal-btn primary" id="savePromptSave">Save</button>
    </div>
  </div>
</div>

<!-- SAVE AS NAME PROMPT -->
<div class="name-prompt-overlay" id="namePromptOverlay">
  <div class="name-prompt-box">
    <div class="name-prompt-label">Save session as:</div>
    <input type="text" class="name-prompt-input" id="namePromptInput" placeholder="Session name" spellcheck="false">
    <div class="name-prompt-actions">
      <button class="modal-btn secondary" id="namePromptCancel">Cancel</button>
      <button class="modal-btn primary" id="namePromptOk">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- KEYBOARD HINT -->
<div class="keyboard-hint">
  <kbd>Space</kbd> play &nbsp; <kbd>N</kbd> next &nbsp; <kbd>M</kbd> mute &nbsp; <kbd>E</kbd> edit
</div>

<!-- Hidden file input for custom sound upload -->
<input type="file" id="soundFileInput" accept="audio/*" style="display:none">
<input type="file" id="importFileInput" accept=".json" style="display:none">

<script src="js/state.js"></script>
<script src="js/audio.js"></script>
<script src="js/themes.js"></script>
<script src="js/timer.js"></script>
<script src="js/ui.js"></script>
<script src="js/popout.js"></script>
<script src="js/dialogs.js"></script>
<script src="js/editor.js"></script>
<script src="js/app.js"></script>
</body>
</html>
