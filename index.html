<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyPro Timer</title>
<link rel="icon" type="image/png" href="joypro-logo-dark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@600&family=DM+Mono:wght@400;500&family=Rethink+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════ */
:root {
  /* Brand */
  --coral: #f19766;
  --teal: #2a7c73;
  --light-teal: #6faf9c;
  --navy: #07273F;
  --charcoal: #3d474d;
  --cream: #f6f3ee;
  --track-light: #e8e4de;
  --track-dark: #2a3a4a;

  /* Light theme (default) */
  --bg: var(--cream);
  --bg-sidebar: #eee9e2;
  --text: var(--charcoal);
  --text-muted: #8a9099;
  --accent: var(--coral);
  --ring-track: var(--track-light);
  --completed: var(--teal);
  --border: #ddd6cc;
  --modal-bg: #fff;
  --modal-overlay: rgba(0,0,0,0.35);
  --hover-bg: rgba(241,151,102,0.08);
  --active-bg: rgba(241,151,102,0.14);
  --btn-bg: var(--cream);
  --btn-hover: #ece7e0;
  --toast-bg: var(--charcoal);
  --toast-text: var(--cream);
  --danger: #d96b5a;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

[data-theme="dark"] {
  --bg: var(--navy);
  --bg-sidebar: #0a2e47;
  --text: var(--cream);
  --text-muted: #8a9aaa;
  --accent: var(--coral);
  --ring-track: var(--track-dark);
  --completed: var(--light-teal);
  --border: #1e3a52;
  --modal-bg: #0e3355;
  --modal-overlay: rgba(0,0,0,0.55);
  --hover-bg: rgba(241,151,102,0.1);
  --active-bg: rgba(241,151,102,0.18);
  --btn-bg: #0a2e47;
  --btn-hover: #143d5a;
  --toast-bg: var(--cream);
  --toast-text: var(--navy);
  --shadow: 0 2px 12px rgba(0,0,0,0.25);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
}

/* ═══════════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Rethink Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  overflow: hidden;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
input { font-family: inherit; color: inherit; }

/* ═══════════════════════════════════════════════════
   APP LAYOUT
   ═══════════════════════════════════════════════════ */
.app {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ═══════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-title {
  font-family: 'Abhaya Libre', serif;
  font-weight: 600;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.01em;
}

.header-logo {
  width: 20px;
  height: 20px;
  object-fit: contain;
}

.header-actions { display: flex; gap: 2px; }
.header-btn {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: background 0.15s;
}
.header-btn:hover { background: var(--hover-bg); }
.header-btn.muted { opacity: 0.5; }

/* ═══════════════════════════════════════════════════
   MAIN
   ═══════════════════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
  position: relative;
}

/* ═══════════════════════════════════════════════════
   BOTTOM PANEL (Sessions/Sequence)
   ═══════════════════════════════════════════════════ */
.sidebar-panel {
  flex: 0 0 auto;
  order: 2;
  position: relative;
  overflow: visible;
}

.sidebar-panel-inner {
  max-height: 200px;
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--border);
  background: var(--bg-sidebar);
  transition: max-height 0.25s ease, opacity 0.2s ease;
  overflow: hidden;
}

.sidebar-panel.collapsed .sidebar-panel-inner {
  max-height: 0;
  border-top: none;
  opacity: 0;
}

.sidebar-panel.collapsed .panel-collapse-tab {
  opacity: 0;
  pointer-events: none;
}

/* Tab-style expand/collapse button */
.panel-tab-btn {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 48px;
  height: 18px;
  border-radius: 8px 8px 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--border);
  border: 1px solid var(--border);
  border-bottom: none;
  z-index: 10;
  cursor: pointer;
  transition: background 0.15s, opacity 0.2s;
}
.panel-tab-btn:hover { background: var(--accent); }
.panel-tab-btn:hover .tab-arrow { border-color: white; }
.tab-arrow {
  width: 8px;
  height: 8px;
  border-left: 2px solid var(--text-muted);
  border-bottom: 2px solid var(--text-muted);
  transition: border-color 0.15s;
}
.tab-arrow.down { transform: rotate(-45deg) translateY(-2px); }
.tab-arrow.up { transform: rotate(135deg) translateY(2px); }

/* Expand tab — anchored at bottom of timer area */
.sidebar-expand-btn {
  bottom: 0;
  opacity: 0;
  pointer-events: none;
}
.sidebar-expand-btn.visible {
  opacity: 1;
  pointer-events: auto;
}

/* Collapse tab — sits above the panel border */
.panel-collapse-tab {
  top: -18px;
}

/* Panel header */
.sidebar-header {
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity 0.15s;
}

.sidebar-name-row {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
  min-width: 0;
}

.sidebar-seq-name {
  font-family: 'Abhaya Libre', serif;
  font-weight: 600;
  font-size: 13px;
  line-height: 1.3;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}

.sidebar-toolbar {
  display: flex;
  gap: 1px;
  align-items: center;
}

.sidebar-btn {
  width: 28px;
  height: 26px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: background 0.15s;
  flex-shrink: 0;
}
.sidebar-btn:hover { background: var(--hover-bg); }

/* Session list */
.sidebar-sessions {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}

.session-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.1s;
  white-space: nowrap;
}
.session-item:hover { background: var(--hover-bg); }
.session-item.active { background: var(--active-bg); font-weight: 500; }

.session-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  width: 14px;
  text-align: center;
  flex-shrink: 0;
}

.session-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
}

.session-icon.completed { color: var(--completed); }
.session-icon.playing { color: var(--accent); }

.session-title-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.session-duration {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════
   TIMER AREA
   ═══════════════════════════════════════════════════ */
.timer-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  position: relative;
  min-width: 0;
  min-height: 0;
  order: 1;
}

.current-session-title {
  font-family: 'Abhaya Libre', serif;
  font-weight: 600;
  font-size: clamp(16px, min(3.5vw, 4vh), 28px);
  margin-bottom: 4px;
  text-align: center;
  letter-spacing: 0.01em;
}

.timer-digits {
  font-family: 'DM Mono', monospace;
  font-size: clamp(32px, min(7vw, 10vh), 64px);
  font-weight: 500;
  letter-spacing: 0.04em;
  white-space: nowrap;
  margin-bottom: 8px;
}

/* Progress bar */
.timer-progress-bar {
  width: clamp(140px, 30vw, 320px);
  height: 4px;
  background: var(--ring-track);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: clamp(12px, 3vh, 24px);
}
.timer-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s linear;
}

/* Controls — small and subtle */
.timer-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  opacity: 0.15;
  transition: opacity 0.25s ease;
}
.timer-controls:hover { opacity: 1; }

.ctrl-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: background 0.15s, transform 0.1s, opacity 0.2s;
  background: var(--btn-bg);
  border: 1px solid var(--border);
}
.ctrl-btn:hover { background: var(--btn-hover); }
.ctrl-btn:active { transform: scale(0.95); }

.ctrl-btn.primary {
  width: 34px;
  height: 34px;
  background: var(--accent);
  color: #fff;
  border: none;
  font-size: 13px;
}
.ctrl-btn.primary:hover { background: #e8884f; }

/* ═══════════════════════════════════════════════════
   TRANSITION OVERLAY
   ═══════════════════════════════════════════════════ */
.transition-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 5;
}
.transition-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.transition-label {
  font-size: 13px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.transition-title {
  font-family: 'Abhaya Libre', serif;
  font-weight: 600;
  font-size: 22px;
}

.transition-countdown {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 4px;
}

.transition-actions {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

.transition-btn {
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s;
}
.transition-btn.start {
  background: var(--accent);
  color: #fff;
}
.transition-btn.start:hover { background: #e8884f; }
.transition-btn.skip {
  background: var(--btn-bg);
  border: 1px solid var(--border);
}
.transition-btn.skip:hover { background: var(--btn-hover); }

/* ═══════════════════════════════════════════════════
   SEQUENCE COMPLETE
   ═══════════════════════════════════════════════════ */
.complete-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 5;
}
.complete-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.complete-icon { font-size: 36px; color: var(--completed); }
.complete-title {
  font-family: 'Abhaya Libre', serif;
  font-weight: 600;
  font-size: 22px;
}
.complete-sub { font-size: 13px; color: var(--text-muted); }

/* ═══════════════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════════════ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-muted);
  text-align: center;
  padding: 40px;
}
.empty-state-icon { font-size: 32px; opacity: 0.5; }
.empty-state-text { font-size: 14px; }
.empty-state-btn {
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  background: var(--accent);
  color: #fff;
}
.empty-state-btn:hover { background: #e8884f; }

/* ═══════════════════════════════════════════════════
   MODALS
   ═══════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--modal-overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--modal-bg);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  transform: translateY(8px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}

.modal-title {
  font-family: 'Abhaya Libre', serif;
  font-weight: 600;
  font-size: 18px;
}

.modal-close {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.modal-close:hover { background: var(--hover-bg); }

.modal-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
}

.modal-footer {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.modal-btn {
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s;
}
.modal-btn.primary { background: var(--accent); color: #fff; }
.modal-btn.primary:hover { background: #e8884f; }
.modal-btn.secondary { background: var(--btn-bg); border: 1px solid var(--border); }
.modal-btn.secondary:hover { background: var(--btn-hover); }
.modal-btn.danger { background: var(--danger); color: #fff; }
.modal-btn.danger:hover { opacity: 0.9; }

/* Editor form */
.editor-sequence-name {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  background: var(--bg);
  margin-bottom: 12px;
  outline: none;
}
.editor-sequence-name:focus { border-color: var(--accent); }

.editor-session {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 10px;
  background: var(--bg);
  border-radius: 8px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}

.editor-session .drag-handle {
  cursor: grab;
  color: var(--text-muted);
  font-size: 14px;
  flex-shrink: 0;
  user-select: none;
}
.editor-session .drag-handle:active { cursor: grabbing; }

.editor-session-fields {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}

.editor-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.editor-session input[type="text"] {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  background: var(--modal-bg);
  min-width: 0;
  outline: none;
}
.editor-session input[type="text"]:focus { border-color: var(--accent); }

.editor-session input[type="number"] {
  width: 50px;
  padding: 6px 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  text-align: center;
  background: var(--modal-bg);
  outline: none;
  -moz-appearance: textfield;
}
.editor-session input[type="number"]::-webkit-inner-spin-button,
.editor-session input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
}
.editor-session input[type="number"]:focus { border-color: var(--accent); }

.editor-time-sep {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text-muted);
}

.editor-session-options {
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 12px;
  color: var(--text-muted);
}

.editor-session-options label {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.editor-session-options input[type="checkbox"] {
  accent-color: var(--accent);
}

.editor-remove-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.editor-remove-btn:hover { background: rgba(217,107,90,0.1); color: var(--danger); }

.editor-add-btn {
  width: 100%;
  padding: 10px;
  border: 1px dashed var(--border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-muted);
  transition: all 0.15s;
}
.editor-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Custom sound upload */
.sound-upload-btn {
  font-size: 11px;
  color: var(--text-muted);
  text-decoration: underline;
  cursor: pointer;
}
.sound-upload-btn:hover { color: var(--accent); }

/* Saved sequences */
.saved-seq-item {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.15s;
}
.saved-seq-item:hover { background: var(--hover-bg); }

.saved-seq-info { flex: 1; min-width: 0; }
.saved-seq-name {
  font-weight: 500;
  font-size: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.saved-seq-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.saved-seq-actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}

.saved-seq-action-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text-muted);
}
.saved-seq-action-btn:hover { background: var(--hover-bg); color: var(--accent); }
.saved-seq-action-btn.delete-btn:hover { background: rgba(217,107,90,0.1); color: var(--danger); }

/* ═══════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════ */
.toast-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--toast-bg);
  color: var(--toast-text);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: auto;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ═══════════════════════════════════════════════════
   CONFIRM DIALOG
   ═══════════════════════════════════════════════════ */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: var(--modal-overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 150;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.confirm-overlay.open { opacity: 1; pointer-events: auto; }

.confirm-box {
  background: var(--modal-bg);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 24px;
  max-width: 380px;
  width: 90%;
  text-align: center;
}
.confirm-msg { font-size: 14px; margin-bottom: 16px; line-height: 1.5; }
.confirm-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

/* ═══════════════════════════════════════════════════

<script>
/* ═══════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════ */
const STORAGE_STATE = 'joypro_state';
const STORAGE_SEQUENCES = 'joypro_sequences';
const STORAGE_SOUNDS = 'joypro_custom_sounds';
const AUTO_ADVANCE_DELAY = 3; // seconds

const DEFAULT_SEQUENCE = {
  name: "JoyPro Coworking Session",
  sessions: [
    { title: "Intention Setting \u{1F9D8}\u200D\u2642\uFE0F", durationMinutes: 3, durationSeconds: 0, soundEnabled: true, soundKey: "default", autoAdvance: true },
    { title: "\u262E\uFE0F Joyful Productivity \u{1F333}", durationMinutes: 25, durationSeconds: 0, soundEnabled: true, soundKey: "default", autoAdvance: true },
    { title: "\u26A1 Energy Reboot \u26A1", durationMinutes: 5, durationSeconds: 0, soundEnabled: true, soundKey: "default", autoAdvance: true },
    { title: "\u262E\uFE0F Joyful Productivity \u{1F333}", durationMinutes: 25, durationSeconds: 0, soundEnabled: true, soundKey: "default", autoAdvance: true },
    { title: "\u{1F64F} Closing", durationMinutes: 2, durationSeconds: 0, soundEnabled: true, soundKey: "default", autoAdvance: false }
  ]
};

/* ═══════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════ */
let state = {
  currentSequenceName: DEFAULT_SEQUENCE.name,
  currentSessionIndex: 0,
  timerSeconds: 180,
  timerTotal: 180,
  globalMute: false,
  theme: "light",
  panelCollapsed: false
};

let sequences = [JSON.parse(JSON.stringify(DEFAULT_SEQUENCE))];
let customSounds = {};

let running = false;
let timerInterval = null;
let timerStartedAt = null;      // wall-clock anchor (Date.now())
let timerSecondsAtStart = null;  // seconds remaining when timer started/resumed
let transitionTimer = null;
let audioCtx = null;
let dirtyTimeout = null;
let currentEditSoundIndex = -1;

// Dirty tracking
let savedSnapshot = null;
let isNewSequenceMode = false; // true when creating a brand new sequence via "+"

/* ═══════════════════════════════════════════════════
   DOM REFS
   ═══════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const sidebarPanel = $('sidebarPanel');
const sidebarSessions = $('sidebarSessions');
const sidebarSeqName = $('sidebarSeqName');
const sidebarExpandBtn = $('sidebarExpandBtn');
const timerDigits = $('timerDigits');
const progressFill = $('progressFill');
const currentTitle = $('currentTitle');
const playBtn = $('playBtn');
const skipBtn = $('skipBtn');
const resetBtn = $('resetBtn');
const themeToggle = $('themeToggle');
const muteToggle = $('muteToggle');
const panelEditBtn = $('panelEditBtn');
const panelSaveBtn = $('panelSaveBtn');
const panelSaveAsBtn = $('panelSaveAsBtn');
const panelNewBtn = $('panelNewBtn');
const panelMenuBtn = $('panelMenuBtn');
const panelCollapseBtn = $('panelCollapseBtn');
const timerArea = $('timerArea');
const transitionOverlay = $('transitionOverlay');
const transitionTitle = $('transitionTitle');
const transitionCountdown = $('transitionCountdown');
const transitionStart = $('transitionStart');
const transitionSkipBtn = $('transitionSkipBtn');
const completeOverlay = $('completeOverlay');
const restartBtn = $('restartBtn');
const editorModal = $('editorModal');
const editorModalTitle = $('editorModalTitle');
const editorClose = $('editorClose');
const editorBody = $('editorBody');
const editorSeqName = $('editorSeqName');
const editorSessions = $('editorSessions');
const editorAdd = $('editorAdd');
const editorCancel = $('editorCancel');
const editorSave = $('editorSave');
const savedModal = $('savedModal');
const savedClose = $('savedClose');
const savedBody = $('savedBody');
const savedCloseBtn = $('savedCloseBtn');
const confirmOverlay = $('confirmOverlay');
const confirmMsg = $('confirmMsg');
const confirmYes = $('confirmYes');
const confirmNo = $('confirmNo');
const savePromptOverlay = $('savePromptOverlay');
const savePromptMsg = $('savePromptMsg');
const savePromptSave = $('savePromptSave');
const savePromptSaveAs = $('savePromptSaveAs');
const savePromptDiscard = $('savePromptDiscard');
const savePromptCancel = $('savePromptCancel');
const namePromptOverlay = $('namePromptOverlay');
const namePromptInput = $('namePromptInput');
const namePromptOk = $('namePromptOk');
const namePromptCancel = $('namePromptCancel');
const soundFileInput = $('soundFileInput');
const popoutBtn = $('popoutBtn');

/* ═══════════════════════════════════════════════════
   PERSISTENCE
   ═══════════════════════════════════════════════════ */
function saveState() {
  try { localStorage.setItem(STORAGE_STATE, JSON.stringify(state)); } catch(e) {}
}

function saveSequences() {
  try { localStorage.setItem(STORAGE_SEQUENCES, JSON.stringify(sequences)); } catch(e) {}
}

function saveSounds() {
  try { localStorage.setItem(STORAGE_SOUNDS, JSON.stringify(customSounds)); }
  catch(e) { showToast('Sound too large to save locally'); }
}

function loadAll() {
  try {
    const s = localStorage.getItem(STORAGE_STATE);
    if (s) state = { ...state, ...JSON.parse(s) };
    const sq = localStorage.getItem(STORAGE_SEQUENCES);
    if (sq) sequences = JSON.parse(sq);
    const snd = localStorage.getItem(STORAGE_SOUNDS);
    if (snd) customSounds = JSON.parse(snd);
  } catch(e) {}
  // Ensure at least the default sequence exists
  if (!sequences.length) sequences = [JSON.parse(JSON.stringify(DEFAULT_SEQUENCE))];
}

function markDirty() {
  clearTimeout(dirtyTimeout);
  dirtyTimeout = setTimeout(saveState, 300);
}

/* ═══════════════════════════════════════════════════
   DIRTY TRACKING (snapshot comparison)
   ═══════════════════════════════════════════════════ */
function takeSnapshot() {
  const seq = getCurrentSequence();
  if (seq) {
    savedSnapshot = JSON.stringify({ name: seq.name, sessions: seq.sessions });
  } else {
    savedSnapshot = null;
  }
}

function hasUnsavedChanges() {
  if (!savedSnapshot) return false;
  const seq = getCurrentSequence();
  if (!seq) return false;
  const current = JSON.stringify({ name: seq.name, sessions: seq.sessions });
  return current !== savedSnapshot;
}

/* ═══════════════════════════════════════════════════
   THEME
   ═══════════════════════════════════════════════════ */
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  themeToggle.innerHTML = state.theme === 'dark' ? '&#9788;' : '&#9789;';
}

themeToggle.addEventListener('click', () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  saveState();
});

/* ═══════════════════════════════════════════════════
   SOUND SYSTEM
   ═══════════════════════════════════════════════════ */
function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playChime() {
  if (state.globalMute) return;
  ensureAudioCtx();

  const seq = getCurrentSequence();
  const session = seq?.sessions[state.currentSessionIndex];
  if (session && !session.soundEnabled) return;

  // Check for custom sound
  const soundKey = state.currentSessionIndex + '_' + state.currentSequenceName;
  if (customSounds[soundKey]) {
    playCustomSound(customSounds[soundKey]);
    return;
  }

  // Synthesized two-tone bell
  const now = audioCtx.currentTime;
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  const gain2 = audioCtx.createGain();

  osc1.type = 'sine';
  osc1.frequency.value = 830;
  osc2.type = 'sine';
  osc2.frequency.value = 1100;

  gain1.gain.setValueAtTime(0.3, now);
  gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
  gain2.gain.setValueAtTime(0.2, now + 0.15);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.9);

  osc1.connect(gain1).connect(audioCtx.destination);
  osc2.connect(gain2).connect(audioCtx.destination);

  osc1.start(now);
  osc1.stop(now + 0.8);
  osc2.start(now + 0.15);
  osc2.stop(now + 0.9);
}

function playCustomSound(dataUrl) {
  ensureAudioCtx();
  fetch(dataUrl)
    .then(r => r.arrayBuffer())
    .then(buf => audioCtx.decodeAudioData(buf))
    .then(decoded => {
      const src = audioCtx.createBufferSource();
      src.buffer = decoded;
      src.connect(audioCtx.destination);
      src.start();
    })
    .catch(() => {});
}

function updateMuteBtn() {
  muteToggle.innerHTML = state.globalMute ? '&#128264;' : '&#128276;';
  muteToggle.classList.toggle('muted', state.globalMute);
}

muteToggle.addEventListener('click', () => {
  ensureAudioCtx();
  state.globalMute = !state.globalMute;
  updateMuteBtn();
  saveState();
  showToast(state.globalMute ? 'Sound muted' : 'Sound on');
});

/* ═══════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════ */
function getCurrentSequence() {
  return sequences.find(s => s.name === state.currentSequenceName) || sequences[0];
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function sessionTotalSeconds(session) {
  return (session.durationMinutes || 0) * 60 + (session.durationSeconds || 0);
}

function sequenceTotalMinutes(seq) {
  return seq.sessions.reduce((acc, s) => acc + sessionTotalSeconds(s), 0) / 60;
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ═══════════════════════════════════════════════════
   SIDEBAR PANEL COLLAPSE
   ═══════════════════════════════════════════════════ */
function updatePanelCollapse() {
  sidebarPanel.classList.toggle('collapsed', state.panelCollapsed);
  sidebarExpandBtn.classList.toggle('visible', state.panelCollapsed);
  // Arrow directions are set via CSS classes, no text to update
}

panelCollapseBtn.addEventListener('click', () => {
  state.panelCollapsed = !state.panelCollapsed;
  updatePanelCollapse();
  saveState();
});

sidebarExpandBtn.addEventListener('click', () => {
  state.panelCollapsed = false;
  updatePanelCollapse();
  saveState();
});

/* ═══════════════════════════════════════════════════
   POPOUT WINDOW
   ═══════════════════════════════════════════════════ */
let popoutWindow = null;

function getPopoutHTML(theme) {
  return `<!DOCTYPE html>
<html lang="en" data-theme="${theme}">
<head>
<meta charset="UTF-8">
<title>JoyPro Timer</title>
<link rel="icon" type="image/png" href="joypro-logo-dark.png">
<link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@600&family=DM+Mono:wght@400;500&family=Rethink+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  --coral: #f19766; --teal: #2a7c73; --navy: #07273F;
  --charcoal: #3d474d; --cream: #f6f3ee;

}

  --bg: var(--navy); --text: var(--cream);
  --text-muted: #8a9aaa; --accent: var(--coral); --border: #1e3a52;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

}

}

}
</style>
</head>
<body>
<div class="popout-session">
  <span class="popout-status" id="popoutStatus"></span>

}

function openPopout() {
  if (popoutWindow && !popoutWindow.closed) {
    popoutWindow.focus();
    return;
  }

  const w = 380, h = 130;
  const left = (window.screenX || window.screenLeft) + window.outerWidth - w - 30;
  const top = (window.screenY || window.screenTop) + 30;

  popoutWindow = window.open('', 'joypro_popout',
    'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top +
    ',toolbar=no,menubar=no,location=no,status=no,resizable=yes,scrollbars=no');

  if (!popoutWindow) {
    showToast('Popout blocked — please allow popups for this site');
    return;
  }

  const doc = popoutWindow.document;
  doc.open();
  doc.write(getPopoutHTML(state.theme));
  doc.close();

  // Sync immediately once fonts load
  popoutWindow.addEventListener('load', () => syncPopout());
  syncPopout();

  popoutWindow.addEventListener('beforeunload', () => { popoutWindow = null; });
  showToast('Popout window opened');
}

function syncPopout() {
  if (!popoutWindow || popoutWindow.closed) { popoutWindow = null; return; }
  try {
    const doc = popoutWindow.document;
    const sessionEl = doc.getElementById('popoutSession');
    const timeEl = doc.getElementById('popoutTime');
    const statusEl = doc.getElementById('popoutStatus');
    if (sessionEl) sessionEl.textContent = currentTitle.textContent;
    if (timeEl) timeEl.textContent = formatTime(state.timerSeconds);
    if (statusEl) {
      statusEl.className = 'popout-status' + (running ? ' playing' : (state.timerSeconds < state.timerTotal ? ' paused' : ''));
    }
    // Sync theme
    doc.documentElement.setAttribute('data-theme', state.theme);
    // Sync document title
    if (running) {
      popoutWindow.document.title = formatTime(state.timerSeconds) + ' — ' + currentTitle.textContent;
    } else {
      popoutWindow.document.title = 'JoyPro Timer';
    }
  } catch(e) {}
}

function renderTimer() {
  timerDigits.textContent = formatTime(state.timerSeconds);

  syncPopout();
}

/* ═══════════════════════════════════════════════════
   TIMER ENGINE
   ═══════════════════════════════════════════════════ */
function startTimer() {
  if (running) return;
  ensureAudioCtx();
  const seq = getCurrentSequence();
  if (!seq || !seq.sessions.length) return;

  running = true;
  timerStartedAt = Date.now();
  timerSecondsAtStart = state.timerSeconds;
  hideOverlays();
  renderSidebar();
  renderTimer();

  timerInterval = setInterval(tick, 250); // poll 4×/sec for snappy updates
}

function pauseTimer() {
  running = false;
  timerStartedAt = null;
  timerSecondsAtStart = null;
  clearInterval(timerInterval);
  timerInterval = null;
  renderSidebar();
  renderTimer();
  markDirty();
}

function tick() {
  // Wall-clock calculation — immune to browser throttling
  const elapsed = Math.floor((Date.now() - timerStartedAt) / 1000);
  const remaining = Math.max(0, timerSecondsAtStart - elapsed);

  if (remaining === state.timerSeconds) return; // no change yet
  state.timerSeconds = remaining;
  renderTimer();
  markDirty();

  if (remaining <= 0) {
    onSessionComplete();
  }
}

function onSessionComplete() {
  pauseTimer();
  playChime();

  const seq = getCurrentSequence();
  if (!seq) return;

  const nextIndex = state.currentSessionIndex + 1;
  if (nextIndex >= seq.sessions.length) {
    showCompleteOverlay();
    return;
  }

  const currentSession = seq.sessions[state.currentSessionIndex];
  const nextSession = seq.sessions[nextIndex];

  if (currentSession.autoAdvance) {
    showTransitionOverlay(nextSession.title, nextIndex, true);
  } else {
    showTransitionOverlay(nextSession.title, nextIndex, false);
  }
}

function advanceToSession(index) {
  const seq = getCurrentSequence();
  if (!seq || index < 0 || index >= seq.sessions.length) return;

  pauseTimer();
  hideOverlays();

  state.currentSessionIndex = index;
  const s = seq.sessions[index];
  state.timerTotal = sessionTotalSeconds(s);
  state.timerSeconds = state.timerTotal;

  renderSidebar();
  renderTimer();
  markDirty();
}

function resetSequence() {
  pauseTimer();
  hideOverlays();
  advanceToSession(0);
}

/* ═══════════════════════════════════════════════════
   TRANSITION & COMPLETE OVERLAYS
   ═══════════════════════════════════════════════════ */
function showTransitionOverlay(nextTitle, nextIndex, autoStart) {
  transitionTitle.textContent = nextTitle;
  transitionOverlay.classList.add('visible');

  if (autoStart) {
    let count = AUTO_ADVANCE_DELAY;
    transitionCountdown.textContent = `Starting in ${count}...`;
    transitionCountdown.style.display = '';

    transitionTimer = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(transitionTimer);
        transitionTimer = null;
        advanceToSession(nextIndex);
        startTimer();
      } else {
        transitionCountdown.textContent = `Starting in ${count}...`;
      }
    }, 1000);
  } else {
    transitionCountdown.style.display = 'none';
  }

  transitionStart.onclick = () => {
    clearInterval(transitionTimer);
    transitionTimer = null;
    advanceToSession(nextIndex);
    startTimer();
  };

  transitionSkipBtn.onclick = () => {
    clearInterval(transitionTimer);
    transitionTimer = null;
    const seq = getCurrentSequence();
    if (seq && nextIndex + 1 < seq.sessions.length) {
      advanceToSession(nextIndex + 1);
      startTimer();
    } else {
      advanceToSession(nextIndex);
      startTimer();
    }
  };
}

function showCompleteOverlay() {
  completeOverlay.classList.add('visible');
  document.title = 'Complete! | JoyPro Timer';
}

function hideOverlays() {
  transitionOverlay.classList.remove('visible');
  completeOverlay.classList.remove('visible');
  clearInterval(transitionTimer);
  transitionTimer = null;
}

/* ═══════════════════════════════════════════════════
   SAVE / SAVE-AS / REVERT LOGIC
   ═══════════════════════════════════════════════════ */
function doSaveCurrentSequence() {
  // Find the sequence in the saved array and overwrite it
  const seq = getCurrentSequence();
  if (!seq) return;

  const idx = sequences.findIndex(s => s.name === state.currentSequenceName);
  if (idx >= 0) {
    sequences[idx] = JSON.parse(JSON.stringify(seq));
  } else {
    // Not found — must have been renamed or is new; add it
    sequences.push(JSON.parse(JSON.stringify(seq)));
  }

  saveSequences();
  takeSnapshot();
  showToast('Sequence saved');
}

function doSaveAsSequence(newName) {
  const seq = getCurrentSequence();
  if (!seq) return;

  const copy = JSON.parse(JSON.stringify(seq));
  copy.name = newName;
  sequences.push(copy);

  // Switch active to the new copy
  state.currentSequenceName = newName;
  // Update the in-memory sequence reference
  // (getCurrentSequence will now find the new one)

  saveSequences();
  saveState();
  takeSnapshot();
  renderSidebar();
  showToast(`Saved as "${newName}"`);
}

function revertCurrentSequence() {
  // Revert the in-memory sequence to the last saved snapshot
  if (!savedSnapshot) return;
  const snapshotData = JSON.parse(savedSnapshot);
  const idx = sequences.findIndex(s => s.name === state.currentSequenceName);
  if (idx >= 0) {
    sequences[idx].name = snapshotData.name;
    sequences[idx].sessions = snapshotData.sessions;
    state.currentSequenceName = snapshotData.name;
  }
}

/**
 * Guard: check unsaved changes before proceeding with an action.
 * If no unsaved changes, calls proceed() immediately.
 * If unsaved changes exist, shows the 4-button save prompt.
 */
function guardUnsavedChanges(proceed) {
  if (hasUnsavedChanges()) {
    showSavePrompt(proceed);
  } else {
    proceed();
  }
}

/* ═══════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════ */
function showToast(msg) {
  const container = $('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

/* ═══════════════════════════════════════════════════
   SEQUENCE EDITOR
   ═══════════════════════════════════════════════════ */
let editorData = [];

function openEditor() {
  isNewSequenceMode = false;
  editorModalTitle.textContent = 'Edit Sequence';
  const seq = getCurrentSequence();
  editorSeqName.value = seq.name;
  editorData = seq.sessions.map(s => ({ ...s }));

  editorModal.classList.add('open');
}

function openEditorNew() {
  isNewSequenceMode = true;
  editorModalTitle.textContent = 'New Sequence';
  editorSeqName.value = 'New Sequence';
  editorData = [];
  renderEditorSessions();
  editorModal.classList.add('open');
}

function closeEditor() {
  editorModal.classList.remove('open');
  isNewSequenceMode = false;
}

function renderEditorSessions() {
  editorSessions.innerHTML = editorData.map((s, i) => `
    <div class="editor-session" data-index="${i}" draggable="true">
      <span class="drag-handle">&#9776;</span>
      <div class="editor-session-fields">
        <div class="editor-row">
          <input type="text" value="${escHtml(s.title)}" data-field="title" placeholder="Session name">
          <input type="number" value="${s.durationMinutes || 0}" data-field="min" min="0" max="999" title="Minutes">
          <span class="editor-time-sep">:</span>
          <input type="number" value="${String(s.durationSeconds || 0).padStart(2,'0')}" data-field="sec" min="0" max="59" title="Seconds">
        </div>
        <div class="editor-session-options">
          <label><input type="checkbox" data-field="sound" ${s.soundEnabled ? 'checked' : ''}> Sound</label>
          <label><input type="checkbox" data-field="auto" ${s.autoAdvance ? 'checked' : ''}> Auto-advance</label>
          <span class="sound-upload-btn" data-field="upload" data-index="${i}">Custom sound</span>
        </div>
      </div>
      <button class="editor-remove-btn" data-action="remove" data-index="${i}">&times;</button>
    </div>
  `).join('');

  // Input listeners
  editorSessions.querySelectorAll('input, .sound-upload-btn').forEach(el => {
    const session = el.closest('.editor-session');
    if (!session) return;
    const idx = parseInt(session.dataset.index);

    if (el.dataset.field === 'title') {
      el.addEventListener('input', () => { editorData[idx].title = el.value; });
    } else if (el.dataset.field === 'min') {
      el.addEventListener('input', () => { editorData[idx].durationMinutes = parseInt(el.value) || 0; });
    } else if (el.dataset.field === 'sec') {
      el.addEventListener('input', () => { editorData[idx].durationSeconds = Math.min(59, Math.max(0, parseInt(el.value) || 0)); });
    } else if (el.dataset.field === 'sound') {
      el.addEventListener('change', () => { editorData[idx].soundEnabled = el.checked; });
    } else if (el.dataset.field === 'auto') {
      el.addEventListener('change', () => { editorData[idx].autoAdvance = el.checked; });
    } else if (el.dataset.field === 'upload') {
      el.addEventListener('click', () => {
        currentEditSoundIndex = parseInt(el.dataset.index);
        soundFileInput.click();
      });
    }
  });

  // Remove buttons
  editorSessions.querySelectorAll('[data-action="remove"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.index);
      editorData.splice(idx, 1);
      renderEditorSessions();
    });
  });

  // Drag and drop reordering
  setupDragReorder();
}

function setupDragReorder() {
  let dragSrcIdx = null;
  editorSessions.querySelectorAll('.editor-session').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragSrcIdx = parseInt(el.dataset.index);
      el.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.style.opacity = '';
      editorSessions.querySelectorAll('.editor-session').forEach(x => x.style.borderTop = '');
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.style.borderTop = '2px solid var(--accent)';
    });
    el.addEventListener('dragleave', () => {
      el.style.borderTop = '';
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.style.borderTop = '';
      const dropIdx = parseInt(el.dataset.index);
      if (dragSrcIdx !== null && dragSrcIdx !== dropIdx) {
        const [moved] = editorData.splice(dragSrcIdx, 1);
        editorData.splice(dropIdx, 0, moved);
        renderEditorSessions();
      }
    });
  });
}

editorAdd.addEventListener('click', () => {
  editorData.push({
    title: "New Session",
    durationMinutes: 25,
    durationSeconds: 0,
    soundEnabled: true,
    soundKey: "default",
    autoAdvance: true
  });
  renderEditorSessions();
  // Scroll to bottom
  editorSessions.parentElement.scrollTop = editorSessions.parentElement.scrollHeight;
});

editorSave.addEventListener('click', () => {
  const name = editorSeqName.value.trim() || "Untitled";
  // Validate: minimum 1 second per session
  for (const s of editorData) {
    const total = (s.durationMinutes || 0) * 60 + (s.durationSeconds || 0);
    if (total < 1) {
      showToast('Each session needs at least 1 second');
      return;
    }
  }

  if (isNewSequenceMode) {
    // Check if name already exists
    if (sequences.some(s => s.name === name)) {
      showToast('A sequence with that name already exists');
      return;
    }
    // Create new sequence
    const newSeq = {
      name: name,
      sessions: editorData.map(s => ({ ...s }))
    };
    sequences.push(newSeq);
    state.currentSequenceName = name;
    state.currentSessionIndex = 0;
    if (newSeq.sessions.length) {
      state.timerTotal = sessionTotalSeconds(newSeq.sessions[0]);
      state.timerSeconds = state.timerTotal;
    }
    running = false;
    clearInterval(timerInterval);

    saveSequences();
    saveState();
    takeSnapshot();
    renderSidebar();
    renderTimer();
    hideOverlays();
    closeEditor();
    showToast('New sequence created');
  } else {
    // Editing existing sequence
    const seq = getCurrentSequence();
    const oldName = seq.name;
    seq.name = name;
    seq.sessions = editorData.map(s => ({ ...s }));
    state.currentSequenceName = name;

    // Update in sequences array (find by old name or reference)
    const idx = sequences.findIndex(s => s === seq);
    if (idx >= 0) {
      sequences[idx] = seq;
    }

    // Reset to beginning
    state.currentSessionIndex = 0;
    if (seq.sessions.length) {
      state.timerTotal = sessionTotalSeconds(seq.sessions[0]);
      state.timerSeconds = state.timerTotal;
    }
    running = false;
    clearInterval(timerInterval);

    saveSequences();
    saveState();
    takeSnapshot();
    renderSidebar();
    renderTimer();
    hideOverlays();
    closeEditor();
    showToast('Sequence saved');
  }
});

editorCancel.addEventListener('click', closeEditor);
editorClose.addEventListener('click', closeEditor);

// Custom sound file handler
soundFileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 500000) {
    showToast('Sound file too large (max 500KB)');
    soundFileInput.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    const key = currentEditSoundIndex + '_' + state.currentSequenceName;
    customSounds[key] = reader.result;
    saveSounds();
    showToast('Custom sound set');
  };
  reader.readAsDataURL(file);
  soundFileInput.value = '';
});

function openSavedModal() {

  savedModal.classList.add('open');

function closeSavedModal() {

function renderSavedList() {
  if (!sequences.length) {
    savedBody.innerHTML = '<div class="empty-state"><div class="empty-state-text">No saved sequences</div></div>';
    return;
  }

  savedBody.innerHTML = sequences.map((seq, i) => {
    const totalMins = Math.round(sequenceTotalMinutes(seq));
    const sessCount = seq.sessions.length;
    const isCurrent = seq.name === state.currentSequenceName;
    return `<div class="saved-seq-item" data-index="${i}">
      <div class="saved-seq-info">
        <div class="saved-seq-name">${escHtml(seq.name)}${isCurrent ? ' <span style="font-size:11px;color:var(--text-muted)">(active)</span>' : ''}</div>
        <div class="saved-seq-meta">${sessCount} session${sessCount !== 1 ? 's' : ''} &middot; ${totalMins} min</div>
      </div>
      <div class="saved-seq-actions">
        <button class="saved-seq-action-btn" data-action="copy" data-index="${i}" title="Duplicate">&#128203;</button>
        <button class="saved-seq-action-btn" data-action="edit" data-index="${i}" title="Edit">&#9998;</button>
        <button class="saved-seq-action-btn delete-btn" data-action="delete" data-index="${i}" title="Delete">&times;</button>
      </div>
    </div>`;
  }).join('');

  // Click row to load
  savedBody.querySelectorAll('.saved-seq-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('[data-action]')) return;
      const idx = parseInt(el.dataset.index);
      closeSavedModal();
      guardUnsavedChanges(() => {
        loadSequence(idx);
      });
    });
  });

  // Copy
  savedBody.querySelectorAll('[data-action="copy"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.index);
      const orig = sequences[idx];
      const copy = JSON.parse(JSON.stringify(orig));
      // Find unique name
      let copyName = orig.name + ' (copy)';
      let counter = 2;
      while (sequences.some(s => s.name === copyName)) {
        copyName = orig.name + ` (copy ${counter})`;
        counter++;
      }
      copy.name = copyName;
      sequences.push(copy);
      saveSequences();
      renderSavedList();
      showToast(`Duplicated "${orig.name}"`);
    });
  });

  // Edit (load + open editor)
  savedBody.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.index);
      const targetName = sequences[idx].name;

      closeSavedModal();

      if (targetName === state.currentSequenceName) {
        // Already active, just open editor
        openEditor();
      } else {
        // Need to switch — check unsaved changes first
        guardUnsavedChanges(() => {
          loadSequence(idx);
          openEditor();
        });
      }
    });
  });

  // Delete
  savedBody.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.index);
      if (sequences.length <= 1) {
        showToast('Cannot delete last sequence');
        return;
      }
      showConfirm(`Delete "${sequences[idx].name}"?`, () => {
        const wasActive = sequences[idx].name === state.currentSequenceName;
        sequences.splice(idx, 1);
        saveSequences();
        if (wasActive) {
          loadSequence(0);
        }
        renderSavedList();
      });
    });
  });
}

function loadSequence(index) {
  if (index < 0 || index >= sequences.length) return;
  pauseTimer();
  hideOverlays();

  const seq = sequences[index];
  state.currentSequenceName = seq.name;
  state.currentSessionIndex = 0;
  if (seq.sessions.length) {
    state.timerTotal = sessionTotalSeconds(seq.sessions[0]);
    state.timerSeconds = state.timerTotal;
  }

  saveState();
  takeSnapshot();
  renderSidebar();
  renderTimer();
  showToast(`Loaded "${seq.name}"`);
}

savedClose.addEventListener('click', closeSavedModal);
savedCloseBtn.addEventListener('click', closeSavedModal);

/* ═══════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
   ═══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  // Don't trigger while typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // Don't trigger with modals open
  const anyModalOpen = editorModal.classList.contains('open') ||
    savedModal.classList.contains('open') ||
    confirmOverlay.classList.contains('open') ||
    savePromptOverlay.classList.contains('open') ||
    namePromptOverlay.classList.contains('open');

  if (e.code === 'Space' && !anyModalOpen) {
    e.preventDefault();
    if (running) pauseTimer();
    else startTimer();
  } else if (e.code === 'KeyN' && !anyModalOpen) {
    skipBtn.click();
  } else if (e.code === 'KeyM') {
    muteToggle.click();
  } else if (e.code === 'KeyE' && !anyModalOpen) {
    openEditor();
  } else if (e.code === 'KeyR' && !anyModalOpen && !e.ctrlKey && !e.metaKey) {
    resetBtn.click();
  } else if (e.code === 'Escape') {
    if (namePromptOverlay.classList.contains('open')) { namePromptOverlay.classList.remove('open'); namePromptCallback = null; }
    else if (savePromptOverlay.classList.contains('open')) { savePromptOverlay.classList.remove('open'); savePromptCallbacks = null; }
    else if (editorModal.classList.contains('open')) closeEditor();
    else if (savedModal.classList.contains('open')) closeSavedModal();
    else if (confirmOverlay.classList.contains('open')) { confirmOverlay.classList.remove('open'); confirmCallback = null; }
  }
});

/* ═══════════════════════════════════════════════════
   MODAL CLOSE ON BACKDROP
   ═══════════════════════════════════════════════════ */
editorModal.addEventListener('click', e => { if (e.target === editorModal) closeEditor(); });
savedModal.addEventListener('click', e => { if (e.target === savedModal) closeSavedModal(); });
confirmOverlay.addEventListener('click', e => { if (e.target === confirmOverlay) { confirmOverlay.classList.remove('open'); confirmCallback = null; }});
savePromptOverlay.addEventListener('click', e => { if (e.target === savePromptOverlay) { savePromptOverlay.classList.remove('open'); savePromptCallbacks = null; }});
namePromptOverlay.addEventListener('click', e => { if (e.target === namePromptOverlay) { namePromptOverlay.classList.remove('open'); namePromptCallback = null; }});

/* ═══════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════ */
function init() {
  loadAll();
  applyTheme();
  updateMuteBtn();
  updatePanelCollapse();

  // Validate state against current sequence
  const seq = getCurrentSequence();
  if (!seq) {
    state.currentSequenceName = sequences[0].name;
  }
  const currentSeq = getCurrentSequence();
  if (state.currentSessionIndex >= currentSeq.sessions.length) {
    state.currentSessionIndex = 0;
  }

  // Set timer from state (restored or fresh)
  const currentSession = currentSeq.sessions[state.currentSessionIndex];
  if (currentSession) {
    const total = sessionTotalSeconds(currentSession);
    // If timerTotal doesn't match, reset
    if (state.timerTotal !== total) {
      state.timerTotal = total;
      state.timerSeconds = total;
    }
    // Clamp seconds
    if (state.timerSeconds > state.timerTotal) state.timerSeconds = state.timerTotal;
    if (state.timerSeconds < 0) state.timerSeconds = 0;
  }

  takeSnapshot();
  renderSidebar();
  renderTimer();
  saveState();

  // Catch up timer immediately when tab regains visibility (defeats browser throttling)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && running) tick();
  });
}

init();
</script>
